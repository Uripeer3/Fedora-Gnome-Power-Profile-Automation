name: Shell quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Run syntax and ShellCheck validation
        run: bash tests/test-syntax.sh

      - name: Upload ShellCheck report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shellcheck-report
          path: .shellcheck-report.json
          if-no-files-found: ignore
